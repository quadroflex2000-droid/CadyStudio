<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Агентами</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: var(--tg-theme-secondary-bg-color, #f0f2f5); 
            color: var(--tg-theme-text-color, #000000); 
            margin: 0; 
            padding: 15px; 
        }
        h1 { text-align: center; font-size: 20px; margin-bottom: 20px; }
        .section { margin-bottom: 25px; }
        .section-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: var(--tg-theme-link-color, #3390ec); border-bottom: 2px solid var(--tg-theme-link-color, #3390ec); padding-bottom: 5px;}
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .card { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            border-radius: 12px; 
            padding: 15px 10px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; align-items: center;
        }
        .avatar { width: 64px; height: 64px; border-radius: 50%; margin-bottom: 10px; background-color: #e2e8f0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .role { font-size: 11px; color: var(--tg-theme-hint-color, #888888); }
    </style>
</head>
<body>
    <h1 id="greeting">Центр Управления</h1>

    <div class="section">
        <div class="section-title">Главные Направления</div>
        <div class="grid">
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cady&backgroundColor=c0aede" alt="Cady"></div>
                <div class="name">Cady</div>
                <div class="role">Linear & SaaS</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Bitrix&backgroundColor=ffdfbf" alt="Bitrix"></div>
                <div class="name">BiMax</div>
                <div class="role">Фабрика Bitrix</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Shopify&backgroundColor=b6e3f4" alt="Shopify"></div>
                <div class="name">Shopify</div>
                <div class="role">Магазин Мебели</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Общие Сервисы (Медиа & Код)</div>
        <div class="grid">
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=CodeMax&backgroundColor=c0aede" alt="CodeMax"></div>
                <div class="name">CodeMax</div>
                <div class="role">Разработка</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Brainy&backgroundColor=ffdfbf" alt="Brainy"></div>
                <div class="name">Brainy</div>
                <div class="role">Сценарии</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Picasso&backgroundColor=b6e3f4" alt="Picasso"></div>
                <div class="name">Picasso</div>
                <div class="role">Визуал</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cutter&backgroundColor=c0aede" alt="Cutter"></div>
                <div class="name">Cutter</div>
                <div class="role">Монтаж</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Vox&backgroundColor=ffdfbf" alt="Vox"></div>
                <div class="name">Vox</div>
                <div class="role">Озвучка</div>
            </div>
            <div class="card">
                <div class="avatar"><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Postman&backgroundColor=b6e3f4" alt="Postman"></div>
                <div class="name">Postman</div>
                <div class="role">Соцсети</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        if (user) document.getElementById('greeting').innerText = `Штаб: ${user.first_name}`;
    </script>
</body>
</html>
